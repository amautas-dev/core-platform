<h2 mat-dialog-title>{{ 'profile.changePassword' | translate }}</h2>
<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'profile.currentPassword' | translate }}</mat-label>
      <input matInput type="password" formControlName="currentPassword" autocomplete="current-password" />
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'profile.newPassword' | translate }}</mat-label>
      <input matInput type="password" formControlName="newPassword" autocomplete="new-password" />
      <mat-hint>{{ 'profile.passwordMinLength' | translate }}</mat-hint>
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'profile.confirmPassword' | translate }}</mat-label>
      <input matInput type="password" formControlName="confirmPassword" autocomplete="new-password" />
    </mat-form-field>
  </form>
  @if (error()) {
    <p class="error">{{ error() | translate }}</p>
  }
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">{{ 'common.cancel' | translate }}</button>
  <button mat-raised-button color="primary" (click)="save()" [disabled]="saving()">
    @if (saving()) {
      <span>{{ 'common.saving' | translate }}</span>
    } @else {
      {{ 'common.save' | translate }}
    }
  </button>
</mat-dialog-actions>
